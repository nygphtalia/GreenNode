function stepper(current, launch=false){
  const labels=['Choose<br>use case','Connect<br>knowledge & tools','Set access<br>& policy','Test &<br>validate','Launch<br>pilot'];

  for(let i=1;i<=5;i++){
    const cls = i<current ? 'done' : (i===current ? (launch?'current-outline':'active') : '');
    const lineCls = i<current ? 'done' : '';
    out+=`<div class="step-node ${cls}"><div class="circle">${i<current?'✓':i}</div><label>${labels[i-1]}</label></div>`;

  }
  return out+'</div>';
}

  <div class="grid grid-3" style="margin-top:22px">${actionCard('▤','Knowledge sources','4 connected, 1 needs review.','knowledge')}${actionCard('▣','Policy alerts','2 low-severity guardrail events.','policies')}${actionCard('👥','Pilot users','Invite or remove testers.','users')}</div>`}
function agentsPage(){return `<div class="hero-title"><div class="sparkle">🤖</div><div><h1>Agents</h1><p class="subtitle">Basic agent management for the pilot workflow.</p></div></div>
  <section class="card flat"><div class="btn-row"><h2 class="card-title">Agent list</h2><button class="btn primary right" onclick="setStep(4)">Run validation test</button></div><table class="table"><thead><tr><th>Agent</th><th>Use case</th><th>Department</th><th>Status</th><th>Policy mode</th><th>Actions</th></tr></thead><tbody><tr><td>Customer Reply Agent</td><td>${state.selectedUseCase}</td><td>${state.department}</td><td><span class="pill green">Live</span></td><td>${state.policyMode}</td><td><button class="btn ghost" onclick="setStep(3)">Edit policy</button></td></tr><tr><td>Finance Review Agent</td><td>Finance Document Review</td><td>Finance</td><td><span class="pill gray">Draft</span></td><td>High-Control Mode</td><td><button class="btn ghost" onclick="showToast('Draft agent opened')">Open</button></td></tr></tbody></table></section>`}
function knowledgePage(){return `<div class="hero-title"><div class="sparkle">▤</div><div><h1>Knowledge</h1><p class="subtitle">Manage the sources used by the agent to draft and validate responses.</p></div></div><section class="card flat"><div class="btn-row"><h2 class="card-title">Connected sources</h2><button class="btn primary right" onclick="openAddModal('knowledge')">＋ Add source</button></div><div class="row-list">${knowledgeSources.map(s=>sourceRow(s)).join('')}</div></section>`}
function toolsPage(){return `<div class="hero-title"><div class="sparkle">⌘</div><div><h1>Tools & Connectors</h1><p class="subtitle">Enable channels and integrations for the pilot workflow.</p></div></div><section class="card flat"><div class="btn-row"><h2 class="card-title">Enabled tools</h2><button class="btn primary right" onclick="openAddModal('tool')">＋ Add tool</button></div><div class="row-list">${tools.map(s=>sourceRow(s)).join('')}<div class="red-note">External public model access is blocked to keep sensitive data within approved boundaries.</div></div></section>`}
function policiesPage(){return `<div class="hero-title"><div class="sparkle">▣</div><div><h1>Policies</h1><p class="subtitle">Review governance controls and guardrail alerts for the live pilot.</p></div></div>
  <div class="grid grid-2"><section class="card flat"><h2 class="card-title">Current policy mode</h2><div class="policy-options" style="grid-template-columns:1fr">${policyBox('Safe Pilot Mode','Balanced controls for early pilots with strong guardrails.','▣')}${policyBox('Standard Department Mode','Good for department-wide use with moderate controls.','👥')}${policyBox('High-Control Mode','Maximum controls for sensitive or regulated scenarios.','▣')}</div><div class="divider"></div>${toggleRow('mask','▣','Mask sensitive data')}${toggleRow('approval','♙','Require human approval for medium/high-risk tasks')}${toggleRow('block','🌐','Block external public models')}${toggleRow('budget','$','Budget alert at 80%')}</section><section class="card flat"><h2 class="card-title">Recent policy alerts</h2><table class="table"><thead><tr><th>Alert</th><th>Severity</th><th>Status</th></tr></thead><tbody><tr><td>External model call blocked</td><td><span class="pill warn">Medium</span></td><td>Resolved by policy</td></tr><tr><td>Customer PII masked in draft</td><td><span class="pill green">Low</span></td><td>Passed</td></tr></tbody></table></section></div>`}
function usersPage(){return `<div class="hero-title"><div class="sparkle">👥</div><div><h1>Users & Roles</h1><p class="subtitle">Manage pilot access and reviewers.</p></div></div><section class="card flat"><div class="btn-row"><h2 class="card-title">Pilot access</h2><button class="btn primary right" onclick="openInviteModal()">＋ Invite pilot user</button></div><table class="table"><thead><tr><th>Name / group</th><th>Type</th><th>Role</th><th>Access</th></tr></thead><tbody>${state.users.map(u=>`<tr><td>${u}</td><td>${u.includes('Leads')?'Microsoft 365 Group':'User'}</td><td>${u.includes('Leads')?'Review group':'Pilot tester'}</td><td><span class="pill green">Enabled</span></td></tr>`).join('')}</tbody></table></section>`}
function costsPage(){return `<div class="hero-title"><div class="sparkle">◔</div><div><h1>Costs & Usage</h1><p class="subtitle">Track measurable token usage, request volume, and cost efficiency by department and workflow.</p></div></div>
  <div class="filter-row"><b>Filters</b><select class="select small" onchange="state.costFilter.provider=this.value"><option>All providers</option><option>Private GPT model</option><option>GreenNode hosted model</option></select><select class="select small" onchange="state.costFilter.department=this.value"><option>All departments</option><option>Customer Service</option><option>Finance</option><option>Human Resources</option></select><select class="select small" onchange="state.costFilter.month=this.value"><option>Current month</option><option>Last month</option></select><button class="btn primary" onclick="showToast('Cost filters applied')">Apply filter</button><button class="btn ghost" onclick="showToast('Dashboard refreshed by admin action')">Run cost check</button><span class="subnav-note">Numbers update only after an admin action.</span></div>
  <div class="usage-hero">${usageKpi('Monthly token budget','1,000,000','tokens','green')}${usageKpi('Token used','700,000','70% of budget','warn')}${usageKpi('Remaining token','300,000','30% left','green')}${usageKpi('Token / request','1,286','average','green')}${usageKpi('Cost used','1,904,000 VND','estimated','warn')}</div>
  <div class="grid grid-2" style="margin-top:20px"><section class="card flat"><h2 class="card-title">Day 15/30 budget checkpoint</h2><div class="alert"><b>⚠</b><span><b>70% of monthly tokens are used while only 50% of the month has passed.</b> This does not prove waste by itself, but it flags a pacing risk. The admin should inspect high-token workflows before increasing pilot scope.</span></div><div style="margin-top:20px"><div class="btn-row"><b>Token budget consumption</b><span class="right"><b>700,000 / 1,000,000</b></span></div><div class="budget-gauge" style="margin-top:10px"><span></span></div></div></section><section class="card flat"><h2 class="card-title">Top token-consuming workflows</h2><div class="row-list">${workflow('Customer Service Reply Drafting','Customer Service','420,000 tokens','60% of used tokens',72,'warn')}${workflow('Finance Document Review','Finance','180,000 tokens','26% of used tokens',46,'')}${workflow('HR Candidate Screening','Human Resources','100,000 tokens','14% of used tokens',24,'')}</div></section></div>
  <div class="grid grid-2" style="margin-top:20px"><section class="card flat"><h2 class="card-title">Efficiency by workflow</h2><table class="table"><thead><tr><th>Workflow</th><th>Requests</th><th>Token/request</th><th>Cost/request</th><th>Status</th></tr></thead><tbody><tr><td>Customer Service Reply Drafting</td><td>326</td><td>1,288</td><td>5,840 VND</td><td><span class="pill warn">Review prompt length</span></td></tr><tr><td>Finance Document Review</td><td>94</td><td>1,915</td><td>8,690 VND</td><td><span class="pill gray">Document-heavy</span></td></tr><tr><td>HR Candidate Screening</td><td>142</td><td>704</td><td>3,180 VND</td><td><span class="pill green">Efficient</span></td></tr></tbody></table></section><section class="card flat"><h2 class="card-title">Optimization suggestions</h2><div class="alert red"><b>!</b><span><b>Customer Service consumes the most tokens.</b> Check whether the agent is retrieving too many historical tickets or using overly long response templates.</span></div><div class="grid grid-2" style="margin-top:16px">${feature('⌕','Reduce retrieval scope','Limit support-ticket lookup to top 3 relevant sources.')}${feature('▤','Shorten template blocks','Move brand boilerplate into reusable snippets.')}</div></section></div>`}
function usageKpi(title,value,desc,cls){return `<div class="usage-card"><span class="micro">${title}</span><div class="value ${cls||''}">${value}</div><span class="micro">${desc}</span></div>`}
function workflow(title,dept,tokens,share,pct,cls){return `<div class="workflow-card"><div class="btn-row"><b>${title}</b><span class="pill gray right">${dept}</span></div><div class="bar ${cls||''}"><span style="width:${pct}%"></span></div><div class="btn-row"><span>${tokens}</span><span class="micro right">${share}</span></div></div>`}
function openAddModal(type){const title= type==='knowledge'?'Add knowledge source':'Add tool or channel'; document.getElementById('modalBox').innerHTML=`<h2 style="margin-top:0">${title}</h2><p class="muted">This is a prototype interaction. The item will not connect to a real external system.</p><div class="form-row"><label>Name</label><input placeholder="Enter ${type==='knowledge'?'source':'tool'} name"></div><div class="form-row"><label>Status</label><select><option>Connected</option><option>Needs review</option><option>Blocked</option></select></div><div class="btn-row" style="margin-top:18px"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary right" onclick="closeModal(); showToast('${title} added to prototype')">Add</button></div>`; document.getElementById('modalBackdrop').classList.add('show')}
function openInviteModal(){document.getElementById('modalBox').innerHTML=`<h2 style="margin-top:0">Invite pilot user</h2><div class="form-row"><label>Email or group</label><input id="inviteInput" placeholder="name@company.com"></div><div class="form-row"><label>Role</label><select><option>Pilot tester</option><option>Reviewer</option><option>Admin</option></select></div><div class="btn-row" style="margin-top:18px"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary right" onclick="addUserFromModal()">Invite</button></div>`; document.getElementById('modalBackdrop').classList.add('show')}
function addUserFromModal(){const v=document.getElementById('inviteInput').value.trim(); if(v) state.users.push(v); closeModal(); showToast('Pilot user invited'); render()}
function closeModal(){document.getElementById('modalBackdrop').classList.remove('show')}
document.getElementById('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal()});
function showToast(text){const t=document.getElementById('toast'); t.textContent=text; t.classList.add('show'); clearTimeout(window.toastTimer); window.toastTimer=setTimeout(()=>t.classList.remove('show'),2400)}
function copySample(){navigator.clipboard?.writeText('GreenNode prototype sample copied.'); showToast('Copied to clipboard')}
